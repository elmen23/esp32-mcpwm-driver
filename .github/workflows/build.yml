name: Build ESP32 MCPWM Firmware

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build firmware
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          idf.py set-target esp32
          idf.py build 2>&1 | tee build.log
          echo "BUILD_OK=1" >> build.log

      - name: Show build log on failure
        if: failure()
        run: cat build.log 2>/dev/null || echo "No build.log"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Prepare firmware artifacts
        run: |
          mkdir -p firmware
          cp build/esp32-mcpwm-driver.bin firmware/
          cp build/bootloader/bootloader.bin firmware/
          cp build/partition_table/partition-table.bin firmware/
          cp build/ota_data_initial.bin firmware/ 2>/dev/null || true
          ls -lh firmware/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: MCPWM-firmware
          path: firmware/
          compression-level: 0
          if-no-files-found: error

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*
          generate_release_notes: true
