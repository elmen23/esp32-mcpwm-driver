name: DIAGNOSTIC — Capture Full Output

on:
  push:
    paths:
      - '.github/workflows/diag.yml'

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.4

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Full diagnostic + build (capture to file)
        id: full
        run: |
          {
            echo "================================================"
            echo "=== 1. ENVIRONMENT ==="
            echo "IDF_PATH = ${IDF_PATH:-NOT SET}"
            echo "PWD      = $(pwd)"
            echo "PATH:"
            echo "$PATH" | tr ':' '\n'
            echo ""
            echo "=== 2. FILES ==="
            ls -la
            echo ""
            echo "=== 3. which idf.py ==="
            which idf.py || echo "NOT IN PATH"
            echo ""
            echo "=== 4. idf.py --version ==="
            idf.py --version 2>&1
            echo "EXIT: $?"
            echo ""
            echo "=== 5. idf.py set-target esp32 ==="
            idf.py set-target esp32 2>&1
            echo "EXIT: $?"
            echo ""
            echo "=== 6. idf.py build ==="
            idf.py build 2>&1
            echo "EXIT: $?"
            echo ""
            echo "=== 7. ls build/ ==="
            ls -la build/ 2>/dev/null || echo "NO build/"
          } > /tmp/diag_output.txt 2>&1
        continue-on-error: true

      - name: 3. Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: diag-output
          path: /tmp/diag_output.txt
          if-no-files-found: error
